name: Build and Push AI Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker Metadata
        id: meta
        run: |
          # Username ko lowercase mein convert karna zaroori hai Docker tags ke liye
          USER=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_username=$USER" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Ab ye automatic lowercase username use karega
          tags: ${{ steps.meta.outputs.docker_username }}/avafinite-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Status Notification
        run: echo "AI Worker image for ${{ steps.meta.outputs.docker_username }} successfully pushed!"