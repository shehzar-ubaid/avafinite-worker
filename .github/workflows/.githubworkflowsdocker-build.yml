name: Build and Push AI Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Inka data GitHub Secrets se aayega
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # YAHAN FIX HAI: Aapka Docker Hub username 'afshankashif699' hai
          tags: afshankashif699/avafinite-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Status Notification
        run: echo "AI Worker image successfully pushed to afshankashif699 account!"