name: Build and Push ComfyUI Docker

# Yeh action tab chalegi jab aap 'main' branch par push karenge
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Is se aap manually bhi Button daba kar chala sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Build ka time barhane ke liye (ComfyUI installation mein time lagta hai)
    timeout-minutes: 120 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # shehzar-ubaid ki jagah aapka username khud hi secrets se utha lega
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-echo:latest
          # Build fast karne ke liye cache use karega
          cache-from: type=gha
          cache-to: type=gha,mode=max